<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>jo's library</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#000;overflow-x:hidden;}
body{font-family:'Courier New',Courier,monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
h1{font-size:10px;letter-spacing:0.2em;color:#333;text-transform:lowercase;margin-bottom:2.5rem;font-weight:400;}

.shelf-wrapper{position:relative;width:100vw;padding-bottom:14px;}
.shelf-fade-left,.shelf-fade-right{position:absolute;top:0;bottom:14px;pointer-events:none;z-index:10;width:clamp(60px,12vw,240px);}
.shelf-fade-left{left:0;background:linear-gradient(to right,#000 0%,transparent 100%);}
.shelf-fade-right{right:0;background:linear-gradient(to left,#000 0%,transparent 100%);}
.shelf-track{width:100%;overflow:hidden;cursor:grab;user-select:none;-webkit-user-select:none;}
.shelf-track.dragging{cursor:grabbing;}
.shelf-inner{display:flex;align-items:flex-end;width:max-content;}
.shelf-plank{height:10px;background:#111;border-radius:1px;box-shadow:0 3px 0 #0a0a0a,0 -1px 0 #1e1e1e;}

.book-spine{
  display:flex;flex-direction:column;justify-content:space-between;align-items:center;
  min-width:0;flex-shrink:0;position:relative;
  border-right:2px solid rgba(0,0,0,0.35);padding:10px 0;
  cursor:pointer;
  transition:opacity 0.4s ease;
}
/* upward hover — smooth for straight books */
.book-spine.straight:not(.borrowed):not(.selected):hover{
  transform:translateY(-14px)!important;
  transition:transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)!important;
}
.book-spine.straight:not(.borrowed):not(.selected){
  transition:transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94),opacity 0.4s ease;
}
.book-spine.borrowed{opacity:0.3;cursor:not-allowed;}
.book-spine.selected{opacity:0!important;pointer-events:none;}

/* spine text slightly more white */
.spine-title{writing-mode:vertical-rl;transform:rotate(180deg);font-size:9px;font-weight:normal;font-family:'Courier New',monospace;color:rgba(255,255,255,0.72);letter-spacing:0.03em;flex:1;text-align:center;line-height:1.2;overflow:hidden;transition:color 0.35s ease;}
.book-spine:hover .spine-title{color:rgba(255,255,255,0.95);}
.spine-author{font-size:7.5px;color:rgba(255,255,255,0.28);writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;overflow:hidden;font-family:'Courier New',monospace;transition:color 0.35s ease;}
.book-spine:hover .spine-author{color:rgba(255,255,255,0.55);}
.borrowed-dot{position:absolute;top:5px;right:1px;width:5px;height:5px;border-radius:50%;background:#8b0000;}

/* OVERLAY */
#overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0);transition:background 0.45s ease;}
#overlay.active{display:block;}
#overlay.dimmed{background:rgba(0,0,0,0.9);}

/* BOOK CONTAINER */
#bookContainer{position:fixed;z-index:110;pointer-events:none;display:none;}
#bookContainer.interactive{pointer-events:all;}
.cover-scene{perspective:1000px;width:200px;height:300px;position:relative;}
.cover-book{width:200px;height:300px;position:relative;transform-style:preserve-3d;will-change:transform;}
.cover-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:2px 5px 5px 2px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:20px 14px 16px;overflow:hidden;}
.cover-spine-3d{position:absolute;top:0;left:0;width:22px;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:2px 0 0 2px;transform-origin:left center;transform:rotateY(-90deg) translateX(-11px);display:flex;flex-direction:column;justify-content:space-between;align-items:center;padding:10px 0;}
.spine-3d-title{writing-mode:vertical-rl;transform:rotate(180deg);font-size:8.5px;color:rgba(255,255,255,0.8);flex:1;text-align:center;overflow:hidden;max-height:100px;font-family:'Courier New',monospace;}
.spine-3d-author{font-size:7px;color:rgba(255,255,255,0.4);writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;font-family:'Courier New',monospace;}
.cover-top-3d{position:absolute;top:0;left:22px;right:0;height:10px;backface-visibility:hidden;transform-origin:top center;transform:rotateX(90deg) translateY(-5px);background:rgba(255,255,255,0.07);}
.cover-bottom-3d{position:absolute;bottom:0;left:22px;right:0;height:10px;backface-visibility:hidden;transform-origin:bottom center;transform:rotateX(-90deg) translateY(5px);background:rgba(0,0,0,0.3);}
.cover-deco{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:60px;height:60px;opacity:0.12;}
.cover-book-title{font-size:12px;font-weight:normal;font-family:'Courier New',monospace;color:rgba(255,255,255,0.93);text-align:center;line-height:1.45;position:relative;z-index:1;}
.cover-book-author{font-size:9px;color:rgba(255,255,255,0.45);font-family:'Courier New',monospace;text-align:center;margin-top:6px;position:relative;z-index:1;}

/* INFO PANEL */
#infoPanel{position:fixed;z-index:110;width:260px;opacity:0;transform:translateX(24px);transition:opacity 0.4s ease,transform 0.4s ease;pointer-events:none;}
#infoPanel.visible{opacity:1;transform:translateX(0);pointer-events:all;}
.info-cat{font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:10px;font-family:'Courier New',monospace;}
.info-title{font-size:17px;font-family:'Courier New',monospace;font-weight:normal;color:rgba(255,255,255,0.9);line-height:1.35;margin-bottom:5px;}
.info-author{font-size:11px;color:rgba(255,255,255,0.38);font-family:'Courier New',monospace;margin-bottom:16px;}
.info-desc{font-size:11px;color:rgba(255,255,255,0.55);font-family:'Courier New',monospace;line-height:1.9;margin-bottom:22px;}
.loan-btn{display:inline-flex;align-items:center;background:transparent;border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.6);font-family:'Courier New',monospace;font-size:11px;padding:8px 18px;border-radius:1px;cursor:pointer;letter-spacing:0.1em;transition:background 0.2s,border-color 0.2s,color 0.2s;}
.loan-btn:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.38);color:rgba(255,255,255,0.88);}

#closeBtn{position:fixed;top:22px;right:26px;z-index:120;font-size:18px;color:rgba(255,255,255,0.2);cursor:pointer;font-family:'Courier New',monospace;line-height:1;transition:color 0.2s;display:none;}
#closeBtn:hover{color:rgba(255,255,255,0.55);}

/* EXPLORE */
#exploreWrap{margin-top:1.8rem;text-align:center;}
#exploreBtn{background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.28);font-family:'Courier New',monospace;font-size:10px;letter-spacing:0.18em;padding:7px 20px;cursor:pointer;border-radius:1px;transition:all 0.2s;text-transform:lowercase;}
#exploreBtn:hover{border-color:rgba(255,255,255,0.32);color:rgba(255,255,255,0.62);}
#explorePanel{display:none;margin-top:1.2rem;width:100vw;flex-direction:column;align-items:center;}
#explorePanel.open{display:flex;}
#searchBar{width:min(400px,80vw);background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.75);font-family:'Courier New',monospace;font-size:12px;padding:6px 2px;outline:none;letter-spacing:0.05em;text-align:center;margin-bottom:1rem;}
#searchBar::placeholder{color:rgba(255,255,255,0.18);}
.cat-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:0.8rem;}
.cat-pill{background:transparent;border:1px solid rgba(255,255,255,0.13);color:rgba(255,255,255,0.32);font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.14em;padding:4px 12px;cursor:pointer;border-radius:1px;transition:all 0.2s;text-transform:lowercase;}
.cat-pill:hover,.cat-pill.active{border-color:rgba(255,255,255,0.42);color:rgba(255,255,255,0.78);}
#clearFilter{background:transparent;border:none;color:rgba(255,255,255,0.2);font-family:'Courier New',monospace;font-size:9px;cursor:pointer;letter-spacing:0.1em;padding:2px 0;display:none;text-decoration:underline;}
#clearFilter.show{display:inline;}
/* Results grid wrapper — rows stack naturally */
#resultsGrid{display:none;width:100vw;background:transparent;padding:2rem clamp(24px,6vw,80px) 4rem;flex-direction:column;align-items:center;gap:0;margin-top:0.6rem;}
#resultsGrid.open{display:flex;}
.result-row{display:flex;flex-wrap:wrap;justify-content:center;gap:0;width:100%;position:relative;align-items:flex-end;}
/* The single shared bar runs underneath ALL covers in a row */
.result-shelf-bar{width:100%;height:4px;background:#fff;opacity:0.12;margin-bottom:3rem;flex-shrink:0;}

/* Explore grid - cover view */
.result-book{display:flex;flex-direction:column;align-items:center;cursor:pointer;width:120px;margin:0 clamp(12px,2.5vw,32px);}
.result-cover{
  width:120px;height:175px;
  border-radius:1px 5px 5px 1px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:12px 10px 10px;position:relative;overflow:hidden;
  transition:transform 0.28s cubic-bezier(0.25,0.46,0.45,0.94),box-shadow 0.28s ease;
  box-shadow:0 4px 18px rgba(0,0,0,0.5);
}
.result-cover:hover{transform:translateY(-10px) scale(1.05);box-shadow:0 20px 40px rgba(0,0,0,0.75);}
.result-cover-spine{position:absolute;left:0;top:0;width:11px;height:100%;border-radius:1px 0 0 1px;}
.result-cover-img{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;border-radius:1px 5px 5px 1px;opacity:0;transition:opacity 0.3s ease;}
.result-cover-img.loaded{opacity:1;}
.result-cover-title{font-size:9px;color:rgba(255,255,255,0.9);font-family:'Courier New',monospace;text-align:center;line-height:1.4;position:relative;z-index:1;}
.result-cover-author{font-size:7.5px;color:rgba(255,255,255,0.45);font-family:'Courier New',monospace;text-align:center;margin-top:5px;position:relative;z-index:1;}
.result-label{font-size:7.5px;color:rgba(255,255,255,0.3);font-family:'Courier New',monospace;text-align:center;line-height:1.5;max-width:120px;padding:6px 2px 0;}

/* LOAN MODAL */
#loanModal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.93);align-items:center;justify-content:center;}
#loanModal.active{display:flex;}
.loan-box{background:#0d0d0d;border:1px solid rgba(255,255,255,0.08);border-radius:2px;padding:28px 32px;width:290px;}
.loan-box h3{font-size:11px;font-family:'Courier New',monospace;font-weight:normal;color:rgba(255,255,255,0.75);margin-bottom:4px;}
.loan-box p{font-size:9px;color:rgba(255,255,255,0.25);font-family:'Courier New',monospace;margin-bottom:16px;}
.loan-box input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);font-family:'Courier New',monospace;font-size:12px;padding:9px 12px;border-radius:1px;margin-bottom:7px;outline:none;}
.loan-box input:focus{border-color:rgba(255,255,255,0.28);}
.loan-box input::placeholder{color:rgba(255,255,255,0.18);}
.loan-row-btns{display:flex;gap:7px;margin-top:8px;}
.loan-confirm{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.16);color:rgba(255,255,255,0.72);font-family:'Courier New',monospace;font-size:10px;padding:9px;border-radius:1px;cursor:pointer;transition:background 0.2s;}
.loan-confirm:hover{background:rgba(255,255,255,0.13);}
.loan-cancel{background:transparent;border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.22);font-family:'Courier New',monospace;font-size:10px;padding:9px 12px;border-radius:1px;cursor:pointer;}
.loan-error{font-size:10px;color:#a06060;font-family:'Courier New',monospace;margin-top:4px;min-height:14px;}

/* Smooth scroll for whole page */
html{scroll-behavior:smooth;}

/* Mobile cover title: hidden by default, revealed on touch */
@media (max-width:600px){
  .cover-book-title,.cover-book-author{
    opacity:0;transition:opacity 0.3s ease;
  }
  .cover-book-title.touch-visible,.cover-book-author.touch-visible{
    opacity:1;
  }
}

/* MOBILE: selected book layout */
@media (max-width:600px){
  #bookContainer{
    position:fixed!important;
    left:50%!important;
    transform:translateX(-50%)!important;
    top:10vh!important;
  }
  #infoPanel{
    position:fixed!important;
    left:0!important;right:0!important;width:100vw!important;
    bottom:0!important;top:auto!important;
    padding:18px 22px 28px!important;
    background:linear-gradient(to top,rgba(0,0,0,0.97) 80%,transparent)!important;
    transform:translateY(20px)!important;
    max-height:48vh;overflow-y:auto;
  }
  #infoPanel.visible{transform:translateY(0)!important;transition:opacity 0.4s ease,transform 0.4s ease!important;}
  .cover-scene,.cover-book{width:150px!important;height:224px!important;}
}
</style>
</head>
<body>

<h1>jo's library</h1>

<div class="shelf-wrapper">
  <div class="shelf-fade-left"></div>
  <div class="shelf-fade-right"></div>

    <div class="shelf-inner" id="shelfInner"></div>
  </div>
  <div class="shelf-plank"></div>
</div>

<div id="exploreWrap">
  <button id="exploreBtn">explore</button>
  <div id="explorePanel">
    <input type="text" id="searchBar" placeholder="search titles, authors, tags..."/>
    <div class="cat-pills">
      <button class="cat-pill" data-cat="Theory">theory</button>
      <button class="cat-pill" data-cat="History">history</button>
      <button class="cat-pill" data-cat="Monographs">monographs</button>
      <button class="cat-pill" data-cat="Typologies">typologies</button>
      <button class="cat-pill" data-cat="Technical">technical</button>
      <button class="cat-pill" data-cat="Serials">serials</button>
    </div>
    <button id="clearFilter">clear</button>
  </div>
</div>
<div id="resultsGrid"></div>

<div id="overlay"></div>
<div id="closeBtn" onclick="closeOverlay()">&#x2715;</div>

<div id="bookContainer">
  <div class="cover-scene">
    <div class="cover-book" id="coverBook">
      <div class="cover-face" id="coverFace">
        <div class="cover-deco"><svg viewBox="0 0 60 60" fill="white"><circle cx="30" cy="30" r="22"/><circle cx="30" cy="30" r="13" id="coverDecoBg"/></svg></div>
        <div class="cover-book-title" id="coverTitle"></div>
        <div class="cover-book-author" id="coverAuthor"></div>
      </div>
      <div class="cover-spine-3d" id="coverSpine3d">
        <span class="spine-3d-title" id="spine3dTitle"></span>
        <span class="spine-3d-author" id="spine3dAuthor"></span>
      </div>
      <div class="cover-top-3d"></div>
      <div class="cover-bottom-3d"></div>
    </div>
  </div>
</div>

<div id="infoPanel">
  <div class="info-cat" id="infoGenre"></div>
  <div class="info-title" id="infoTitle"></div>
  <div class="info-author" id="infoAuthor"></div>
  <div class="info-desc" id="infoDesc"></div>
  <button class="loan-btn" id="loanBtn">loan</button>
</div>

<div id="loanModal">
  <div class="loan-box">
    <h3 id="loanModalTitle"></h3>
    <p>code</p>
    <input type="text" id="codeInput" placeholder="code" style="text-transform:lowercase;letter-spacing:0.12em;"/>
    <div class="loan-error" id="loanError"></div>
    <div class="loan-row-btns">
      <button class="loan-confirm" id="loanConfirm">loan</button>
      <button class="loan-cancel" id="loanCancel">cancel</button>
    </div>
  </div>
</div>

// Width variation: narrow=28, normal=34, wide=42, thick=50
const WIDTH_SIZES=[28,28,34,34,34,34,42,42,50];
function bookWidth(id){return WIDTH_SIZES[id%WIDTH_SIZES.length];}
function bookHeight(b){const h=b.title.split('').reduce((a,c)=>a+c.charCodeAt(0),0);return 160+(h%80);}

// Tilt: mix of left and right tilts, ~1 in 5 books, never consecutive
// tiltDir: -1 = left, +1 = right
const BOOKS = RAW.map((b,i)=>{
  let tilt=false,tiltDir=-1;
  if(i%5===2){
    tilt=true;
    // Alternate direction: even groups tilt left, odd groups tilt right
    tiltDir = (Math.floor(i/5)%2===0) ? -1 : 1;
  }
  return{id:i+1,...b,color:catColor(b.cat),height:bookHeight(b),width:bookWidth(i),tilt,tiltDir,borrowed:false};
});

const BASE_TILT_DEG=4; // consistent angle magnitude
const GAP=3;

const TARGET_SPEED=0.38;
// Smooth resume: ease in over 4 seconds
const RESUME_DURATION=4000;
let offsetX=0,paused=false,overlayOpen=false,isClosing=false;
let resuming=false,resumeStart=null,resumeTimer=null;
let currentBookId=null,selectedSpineEl=null,openGen=0;
let tiltActive=false,baseTilt={x:0,y:0},currentTilt={x:0,y:0};
let bookRevealed=false,activeFilter=null,searchQuery='';

function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

// Compute each book's left position accounting for tilt direction
function computePositions(books){
  const positions=[];
  let x=0;
  books.forEach((book,i)=>{
    const prev=books[i-1];
    let marginLeft=GAP;
    if(book.tilt){
      const radians=BASE_TILT_DEG*Math.PI/180;
      const extra=Math.sin(radians)*book.height;
      if(book.tiltDir<0){
        // leans left: top goes left, needs left margin
        marginLeft=GAP+extra+4;
      } else {
        // leans right: top goes right, minimal left margin
        marginLeft=GAP+2;
      }
    }
    // After a right-leaning book: add right margin for its overhang
    if(prev&&prev.tilt&&prev.tiltDir>0){
      const radians=BASE_TILT_DEG*Math.PI/180;
      marginLeft+=Math.sin(radians)*prev.height*0.6+4;
    }
    positions.push({book,x:x+marginLeft,marginLeft});
    x+=marginLeft+book.width;
  });
  return{positions,totalWidth:x};
}

let bookPositions=[];
let setWidth=0;

function buildShelf(){
  const inner=document.getElementById('shelfInner');
  inner.innerHTML='';
  inner.style.position='relative';
  inner.style.height=(Math.max(...BOOKS.map(b=>b.height))+20)+'px';

  const{positions,totalWidth}=computePositions(BOOKS);
  bookPositions=positions;
  setWidth=totalWidth;

  for(let copy=0;copy<3;copy++){
    positions.forEach(({book,x})=>{
      const el=document.createElement('div');
      const cls=['book-spine'];
      if(book.borrowed)cls.push('borrowed');
      if(!book.tilt)cls.push('straight');
      el.className=cls.join(' ');
      const deg=book.tilt ? book.tiltDir*BASE_TILT_DEG : 0;
      el.style.cssText=[
        `position:absolute`,
        `left:${copy*totalWidth+x}px`,
        `bottom:0`,
        `width:${book.width}px`,
        `height:${book.height}px`,
        `background:${book.color}`,
        book.tilt ? `transform:rotate(${deg}deg)` : '',
        book.tilt ? `transform-origin:bottom center` : '',
      ].filter(Boolean).join(';')+';';
      el.dataset.id=book.id;
      el.dataset.borrowed=book.borrowed?'1':'0';
      el.dataset.tiltDeg=deg;
      const auth=book.author==='N/A'?'':book.author.split(/[ ,]/)[book.author.split(/[ ,]/).length-1];
      el.innerHTML=`<span class="spine-title">${book.title}</span><span class="spine-author">${auth}</span>${book.borrowed?'<span class="borrowed-dot"></span>':''}`;
      if(book.tilt){
        el.addEventListener('mouseenter',()=>{
          if(!el.classList.contains('selected')){
            el.style.transition='transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)';
            el.style.transform='translateY(-14px) rotate(0deg)';
          }
        });
        el.addEventListener('mouseleave',()=>{
          if(!el.classList.contains('selected')){
            el.style.transition='transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)';
            el.style.transform=`rotate(${deg}deg)`;
          }
        });
      }
      inner.appendChild(el);
    });
  }
  inner.style.width=(setWidth*3)+'px';
  offsetX=setWidth;
  applyOffset();
}

function applyOffset(){
  const inner=document.getElementById('shelfInner');
  if(!inner||!setWidth)return;
  if(offsetX>=setWidth*2)offsetX-=setWidth;
  if(offsetX<0)offsetX+=setWidth;
  inner.style.transform=`translateX(${-offsetX}px)`;
}

function scheduleResume(delay){
  if(resumeTimer)clearTimeout(resumeTimer);
  resumeTimer=setTimeout(()=>{
    paused=false;
    resuming=true;
    resumeStart=null;
  },delay);
}

function tick(ts){
  if(!paused){
    let speed=TARGET_SPEED;
    if(resuming){
      if(!resumeStart)resumeStart=ts;
      const t=Math.min((ts-resumeStart)/RESUME_DURATION,1);
      speed=TARGET_SPEED*easeInOutCubic(t);
      if(t>=1)resuming=false;
    }
    offsetX+=speed;
    if(offsetX>=setWidth*2)offsetX-=setWidth;
    if(offsetX<0)offsetX+=setWidth;
    document.getElementById('shelfInner').style.transform=`translateX(${-offsetX}px)`;
  }
  if(overlayOpen&&bookRevealed&&!isClosing){
    const tx=tiltActive?baseTilt.x:0,ty=tiltActive?baseTilt.y:0;
    currentTilt.x+=(tx-currentTilt.x)*0.06;
    currentTilt.y+=(ty-currentTilt.y)*0.06;
    const cb=document.getElementById('coverBook');
    if(cb){cb.style.transition='none';cb.style.transform=`rotateY(${currentTilt.y}deg) rotateX(${currentTilt.x}deg)`;}
  }
  requestAnimationFrame(tick);
}

function isMobile(){return window.innerWidth<=600;}

function showCover(id,spineEl){
  const book=BOOKS.find(b=>b.id===id);
  if(!book||overlayOpen||isClosing)return;
  currentBookId=id;selectedSpineEl=spineEl;openGen++;
  spineEl.classList.add('selected');
  if(book.tilt){spineEl.style.transition='none';spineEl.style.transform='rotate(0deg)';}
  paused=true;resuming=false;overlayOpen=true;bookRevealed=false;isClosing=false;
  tiltActive=false;currentTilt={x:0,y:0};baseTilt={x:0,y:0};
  if(resumeTimer)clearTimeout(resumeTimer);

  const fill=s=>document.getElementById(s);
  fill('coverFace').style.background=book.color;
  fill('coverSpine3d').style.background=darken(book.color,40);
  fill('coverDecoBg').setAttribute('fill',book.color);
  fill('coverTitle').textContent=book.title;
  fill('coverAuthor').textContent=book.author==='N/A'?'':book.author;
  fill('spine3dTitle').textContent=book.title;
  fill('spine3dAuthor').textContent=book.author==='N/A'?'':book.author.split(/[ ,]/).pop();
  fill('infoGenre').textContent=book.cat+' / '+book.sub;
  fill('infoTitle').textContent=book.title;
  fill('infoAuthor').textContent=book.author==='N/A'?'':book.author;
  fill('infoDesc').textContent=book.tags;
  fill('loanModalTitle').textContent=book.title;

  const mobile=isMobile();
  const sr=spineEl.getBoundingClientRect();
  const bookW=mobile?160:200,bookH=mobile?240:300;
  const vpW=window.innerWidth,vpH=window.innerHeight;

  let finalLeft,finalTop;
  if(mobile){
    finalLeft=vpW/2-bookW/2;
    finalTop=Math.max(20,vpH*0.08);
  } else {
    finalLeft=vpW/2-bookW/2-140;
    finalTop=vpH/2-bookH/2;
  }

  const bc=document.getElementById('bookContainer');
  const cb=document.getElementById('coverBook');
  const info=document.getElementById('infoPanel');
  info.classList.remove('visible');

  // Resize cover scene for mobile
  const scene=document.querySelector('.cover-scene');
  scene.style.width=bookW+'px';scene.style.height=bookH+'px';
  cb.style.width=bookW+'px';cb.style.height=bookH+'px';

  if(!mobile){
    info.style.left=(finalLeft+bookW+44)+'px';
    info.style.top=finalTop+'px';
    info.style.bottom='';info.style.width='260px';info.style.background='';
  }

  bc.style.display='block';bc.classList.remove('interactive');
  const scaleX=sr.width/bookW;
  const scaleY=sr.height/bookH;
  cb.style.transformOrigin='left center';
  bc.style.transition='none';
  bc.style.left=sr.left+'px';
  bc.style.top=(sr.top+sr.height/2-bookH/2)+'px';
  cb.style.transition='none';
  cb.style.transform=`scaleX(${scaleX}) scaleY(${scaleY}) rotateY(75deg)`;

  const ov=document.getElementById('overlay');
  ov.classList.add('active');
  document.getElementById('closeBtn').style.display='block';

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    ov.classList.add('dimmed');
    bc.style.transition='left 0.7s cubic-bezier(0.4,0,0.2,1),top 0.7s cubic-bezier(0.4,0,0.2,1)';
    bc.style.left=finalLeft+'px';bc.style.top=finalTop+'px';
    cb.style.transition='transform 0.7s cubic-bezier(0.4,0,0.2,1)';
    cb.style.transform='scaleX(1) scaleY(1) rotateY(0deg)';
    bc.classList.add('interactive');
    // Fade in info — abort immediately if overlay was closed before timer fires
    const myGen=openGen;
    setTimeout(()=>{
      if(!overlayOpen||openGen!==myGen)return;
      bookRevealed=true;
      setTimeout(()=>{if(!overlayOpen||openGen!==myGen)return;info.classList.add('visible');},80);
    },500);
  }));
}

function closeOverlay(){
  if(!overlayOpen||isClosing)return;
  isClosing=true;bookRevealed=false;tiltActive=false;baseTilt={x:0,y:0};currentTilt={x:0,y:0};
  document.getElementById('coverTitle').classList.remove('touch-visible');
  document.getElementById('coverAuthor').classList.remove('touch-visible');
  document.getElementById('infoPanel').classList.remove('visible');
  const cb=document.getElementById('coverBook');
  const bc=document.getElementById('bookContainer');
  bc.classList.remove('interactive');
  cb.style.transition='transform 0.4s cubic-bezier(0.4,0,0.2,1)';
  cb.style.transform='scaleX(0.18) scaleY(0.8) rotateY(75deg)';
  document.getElementById('overlay').classList.remove('dimmed');
  if(selectedSpineEl){
    const sr=selectedSpineEl.getBoundingClientRect();
    const bookH=isMobile()?240:300;
    bc.style.transition='left 0.4s cubic-bezier(0.4,0,0.2,1),top 0.4s cubic-bezier(0.4,0,0.2,1)';
    bc.style.left=sr.left+'px';bc.style.top=(sr.top+sr.height/2-bookH/2)+'px';
  }
  setTimeout(()=>{
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('closeBtn').style.display='none';
    bc.style.display='none';bc.style.transition='none';
    cb.style.transition='none';cb.style.transform='scaleX(1) scaleY(1) rotateY(0deg)';
    cb.style.transformOrigin='';
    overlayOpen=false;isClosing=false;
    if(selectedSpineEl){
      const b=BOOKS.find(b=>b.id===parseInt(selectedSpineEl.dataset.id));
      selectedSpineEl.classList.remove('selected');
      if(b&&b.tilt){
        const deg=b.tiltDir*BASE_TILT_DEG;
        selectedSpineEl.style.transition='transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)';
        selectedSpineEl.style.transform=`rotate(${deg}deg)`;
      }
      selectedSpineEl=null;
    }
    // Resume scroll after 3 seconds, very smooth
    scheduleResume(3000);
  },420);
}

document.getElementById('overlay').addEventListener('click',()=>{if(overlayOpen)closeOverlay();});
const coverScene=document.querySelector('.cover-scene');
coverScene.addEventListener('mousemove',e=>{
  if(!overlayOpen||!bookRevealed||isClosing)return;
  tiltActive=true;const r=coverScene.getBoundingClientRect();
  baseTilt.y=((e.clientX-(r.left+r.width/2))/(r.width/2))*16;
  baseTilt.x=-((e.clientY-(r.top+r.height/2))/(r.height/2))*10;
});
coverScene.addEventListener('mouseleave',()=>{tiltActive=false;baseTilt={x:0,y:0};});
coverScene.addEventListener('click',e=>e.stopPropagation());
// Mobile: tap cover to reveal title
coverScene.addEventListener('touchstart',e=>{
  if(window.innerWidth>600)return;
  document.getElementById('coverTitle').classList.toggle('touch-visible');
  document.getElementById('coverAuthor').classList.toggle('touch-visible');
  e.stopPropagation();
},{passive:true});
document.getElementById('infoPanel').addEventListener('click',e=>e.stopPropagation());

document.getElementById('loanBtn').addEventListener('click',()=>{
  document.getElementById('loanError').textContent='';
  document.getElementById('codeInput').value='';
  document.getElementById('loanModal').classList.add('active');
});
document.getElementById('loanCancel').addEventListener('click',()=>document.getElementById('loanModal').classList.remove('active'));

document.getElementById('loanConfirm').addEventListener('click',async()=>{
  const book=BOOKS.find(b=>b.id===currentBookId);if(!book)return;
  const rawCode=document.getElementById('codeInput').value.trim().toUpperCase();
  const err=document.getElementById('loanError');
  const btn=document.getElementById('loanConfirm');
  if(!VALID_CODES.includes(rawCode)){err.textContent='invalid code.';return;}
  const ex=loans[rawCode]||[];
  if(ex.length>=MAX_LOANS){err.textContent=`code limit reached (${MAX_LOANS}).`;return;}
  const userName=CODE_NAMES[rawCode]||rawCode;
  btn.textContent='sending...';btn.disabled=true;err.textContent='';
  try{
    // Make sure emailjs is initialised (handles deferred load)
    if(window.emailjs){
      await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{
        "user-name":userName,
        "book_name":book.title,
      });
    }
    loans[rawCode]=[...ex,currentBookId];
    btn.textContent='sent!';
    setTimeout(()=>{
      document.getElementById('loanModal').classList.remove('active');
      btn.textContent='loan';btn.disabled=false;
    },1400);
  }catch(e){
    err.textContent='could not send — try again.';
    btn.textContent='loan';btn.disabled=false;
    console.error('EmailJS error:',e);
  }
});

// Drag on shelf
const track=document.getElementById('shelfTrack');
let dragStartX=0,offsetAtDragStart=0,isDragging=false,didMove=false,lastX=0,vel=0,pendingId=null,pendingEl=null;
track.addEventListener('mousedown',e=>{
  if(overlayOpen)return;
  isDragging=true;didMove=false;dragStartX=e.clientX;offsetAtDragStart=offsetX;
  lastX=e.clientX;vel=0;pendingId=null;pendingEl=null;
  const sp=e.target.closest('.book-spine');
  if(sp&&sp.dataset.borrowed==='0'){pendingId=parseInt(sp.dataset.id);pendingEl=sp;}
  track.classList.add('dragging');e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const dx=e.clientX-dragStartX;
  if(Math.abs(dx)>5){didMove=true;pendingId=null;}
  if(didMove){offsetX=offsetAtDragStart-dx;if(offsetX>=setWidth*2)offsetX-=setWidth;if(offsetX<0)offsetX+=setWidth;document.getElementById('shelfInner').style.transform=`translateX(${-offsetX}px)`;vel=(lastX-e.clientX)*0.6;lastX=e.clientX;paused=true;resuming=false;if(!overlayOpen)scheduleResume(3000);}
});
window.addEventListener('mouseup',()=>{
  if(!isDragging)return;isDragging=false;track.classList.remove('dragging');
  if(!didMove&&pendingId!==null&&pendingEl)showCover(pendingId,pendingEl);
  else if(didMove){let v=vel;(function gl(){if(Math.abs(v)<0.15)return;offsetX+=v;if(offsetX>=setWidth*2)offsetX-=setWidth;if(offsetX<0)offsetX+=setWidth;document.getElementById('shelfInner').style.transform=`translateX(${-offsetX}px)`;v*=0.93;requestAnimationFrame(gl);})();}
  pendingId=null;pendingEl=null;
});
let tSX=0,tOS=0,tDM=false,tLX=0,tV=0,tPI=null,tPE=null;
track.addEventListener('touchstart',e=>{if(overlayOpen)return;tSX=e.touches[0].clientX;tOS=offsetX;tDM=false;tLX=e.touches[0].clientX;tV=0;tPI=null;tPE=null;const sp=e.target.closest('.book-spine');if(sp&&sp.dataset.borrowed==='0'){tPI=parseInt(sp.dataset.id);tPE=sp;}},{passive:true});
track.addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-tSX;if(Math.abs(dx)>5){tDM=true;tPI=null;}if(tDM){offsetX=tOS-dx;if(offsetX>=setWidth*2)offsetX-=setWidth;if(offsetX<0)offsetX+=setWidth;document.getElementById('shelfInner').style.transform=`translateX(${-offsetX}px)`;tV=(tLX-e.touches[0].clientX)*0.6;tLX=e.touches[0].clientX;paused=true;resuming=false;if(!overlayOpen)scheduleResume(3000);}},{passive:true});
track.addEventListener('touchend',()=>{if(!tDM&&tPI!==null&&tPE)showCover(tPI,tPE);else if(tDM){let v=tV;(function gl(){if(Math.abs(v)<0.15)return;offsetX+=v;if(offsetX>=setWidth*2)offsetX-=setWidth;if(offsetX<0)offsetX+=setWidth;document.getElementById('shelfInner').style.transform=`translateX(${-offsetX}px)`;v*=0.93;requestAnimationFrame(gl);})();}tPI=null;tPE=null;});

// Explore
document.getElementById('exploreBtn').addEventListener('click',()=>{
  const p=document.getElementById('explorePanel');p.classList.toggle('open');
  if(p.classList.contains('open')){
    setTimeout(()=>p.scrollIntoView({behavior:'smooth',block:'nearest'}),60);
  } else {
    clearExplore();
  }
});
document.querySelectorAll('.cat-pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    const cat=pill.dataset.cat;
    if(activeFilter===cat){activeFilter=null;pill.classList.remove('active');}
    else{document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));activeFilter=cat;pill.classList.add('active');}
    runFilter();
  });
});
document.getElementById('searchBar').addEventListener('input',e=>{searchQuery=e.target.value.toLowerCase();runFilter();});
document.getElementById('clearFilter').addEventListener('click',clearExplore);
function clearExplore(){
  activeFilter=null;searchQuery='';document.getElementById('searchBar').value='';
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('clearFilter').classList.remove('show');
  document.getElementById('resultsGrid').classList.remove('open');
  document.getElementById('resultsGrid').innerHTML='';
}
const BOOKS_PER_ROW=Math.max(4,Math.floor((Math.min(window.innerWidth,900)-80)/100));
function makeBookCard(book){
  const el=document.createElement('div');el.className='result-book';
  const spineColor=darken(book.color,30);
  const imgPath=book.image?`covers/${book.image}`:'';
  el.innerHTML=`
    <div class="result-cover" style="background:${book.color};">
      <div class="result-cover-spine" style="background:${spineColor};"></div>
      ${imgPath?`<img class="result-cover-img" src="${imgPath}" alt="" onload="this.classList.add('loaded')" onerror="this.style.display='none'">`:''}
      <div class="cover-deco" style="width:36px;height:36px;top:10px;opacity:0.09;"><svg viewBox="0 0 60 60" fill="white"><circle cx="30" cy="30" r="22"/><circle cx="30" cy="30" r="13" fill="${book.color}"/></svg></div>
      <div class="result-cover-title">${book.title}</div>
      <div class="result-cover-author">${book.author==='N/A'?'':book.author}</div>
    </div>
    <div class="result-label">${book.cat}</div>`;
  el.addEventListener('click',()=>{
    const spines=[...document.querySelectorAll('.book-spine')];
    const vpCX=window.innerWidth/2;let bestEl=null,bestDist=Infinity;
    spines.forEach(s=>{if(parseInt(s.dataset.id)===book.id){const r=s.getBoundingClientRect();const d=Math.abs(r.left+r.width/2-vpCX);if(d<bestDist){bestDist=d;bestEl=s;}}});
    if(bestEl)showCover(book.id,bestEl);
  });
  return el;
}
function runFilter(){
  const has=activeFilter||searchQuery;
  document.getElementById('clearFilter').classList.toggle('show',!!has);
  const grid=document.getElementById('resultsGrid');
  if(!has){grid.classList.remove('open');grid.innerHTML='';return;}
  const results=BOOKS.filter(b=>{
    const cm=!activeFilter||b.cat===activeFilter;
    const q=searchQuery;
    const tm=!q||(b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)||b.tags.toLowerCase().includes(q)||b.sub.toLowerCase().includes(q));
    return cm&&tm;
  });
  grid.innerHTML='';grid.classList.add('open');
  // Build rows — bigger cards (120px + ~64px margins = ~184px each)
  const perRow=Math.max(3,Math.floor((Math.min(window.innerWidth,1200)-100)/184));
  for(let i=0;i<results.length;i+=perRow){
    const chunk=results.slice(i,i+perRow);
    const rowWrap=document.createElement('div');rowWrap.style.cssText='display:flex;flex-direction:column;align-items:center;width:100%;';
    const rowEl=document.createElement('div');rowEl.className='result-row';
    chunk.forEach(book=>rowEl.appendChild(makeBookCard(book)));
    const bar=document.createElement('div');bar.className='result-shelf-bar';
    rowWrap.appendChild(rowEl);rowWrap.appendChild(bar);
    grid.appendChild(rowWrap);
  }
  // Smooth scroll to results
  setTimeout(()=>grid.scrollIntoView({behavior:'smooth',block:'start'}),60);
}

window.addEventListener('load',()=>{
  if(window.emailjs)emailjs.init({publicKey:EMAILJS_PUBLIC});
  buildShelf();
  const inner=document.getElementById('shelfInner');
  inner.style.opacity='0';
  setTimeout(()=>{inner.style.transition='opacity 1.2s ease';inner.style.opacity='1';},150);
  requestAnimationFrame(tick);
});
</script>
