<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Josiah's Library</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#000;overflow-x:hidden;}
body{
  font-family:'monospace',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;
}
h1{
  font-size:11px;letter-spacing:0.22em;color:#444;
  text-transform:uppercase;margin-bottom:2.5rem;font-family:'monospace',sans-serif;font-weight:400;
}

.shelf-wrapper{
  position:relative;
  width:100vw;
  padding-bottom:14px;
}
.shelf-fade-left,.shelf-fade-right{
  position:absolute;top:0;bottom:14px;width:180px;pointer-events:none;z-index:10;
}
.shelf-fade-left{left:0;background:linear-gradient(to right,#000 0%,transparent 100%);}
.shelf-fade-right{right:0;background:linear-gradient(to left,#000 0%,transparent 100%);}
.shelf-track{width:100%;overflow:hidden;cursor:grab;user-select:none;-webkit-user-select:none;}
.shelf-track.dragging{cursor:grabbing;}
.shelf-inner{display:flex;gap:3px;align-items:flex-end;width:max-content;}
.shelf-plank{
  height:12px;background:#5a3e0a;border-radius:1px;
  box-shadow:0 4px 0 #3a2605, 0 -1px 0 #7a5510;
}

.book-spine{
  display:flex;flex-direction:column;justify-content:space-between;align-items:center;
  width:36px;min-width:36px;border-radius:2px 0 0 2px;
  flex-shrink:0;position:relative;
  border-right:2px solid rgba(0,0,0,0.3);padding:10px 0;
  cursor:pointer;
  transition:transform 0.18s ease, opacity 0.3s ease;
}
.book-spine:not(.borrowed):hover{transform:translateY(-12px);}
.book-spine.borrowed{opacity:0.35;cursor:not-allowed;}
.book-spine.borrowed:hover{transform:none;}
.book-spine.selected{opacity:0;pointer-events:none;transform:translateY(-20px);}

.spine-title{
  writing-mode:vertical-rl;transform:rotate(180deg);
  font-size:9.5px;font-weight:normal;font-family:'monospace',sans-serif;
  color:rgba(255,255,255,0.85);letter-spacing:0.04em;
  flex:1;text-align:center;line-height:1.2;overflow:hidden;max-height:110px;
}
.spine-author{
  font-size:8px;color:rgba(255,255,255,0.45);
  writing-mode:vertical-rl;transform:rotate(180deg);
  white-space:nowrap;overflow:hidden;font-family:'monospace',sans-serif;
}
.borrowed-dot{position:absolute;top:5px;right:1px;width:5px;height:5px;border-radius:50%;background:#c03030;}

/* OVERLAY */
#overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0);
  transition:background 0.4s ease;
}
#overlay.active{display:block;}
#overlay.dimmed{background:rgba(0,0,0,0.82);}

/* BOOK CONTAINER — positioned absolutely to animate from spine */
#bookContainer{
  position:fixed;
  z-index:110;
  transform-style:preserve-3d;
  pointer-events:none;
  display:none;
}
#bookContainer.interactive{pointer-events:all;}

/* 3D SCENE */
.cover-scene{
  perspective:1000px;
  width:200px;height:300px;
  position:relative;
}
.cover-book{
  width:200px;height:300px;
  position:relative;
  transform-style:preserve-3d;
  will-change:transform;
  transition:transform 0.75s cubic-bezier(0.4,0,0.2,1);
}
.cover-face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:2px 5px 5px 2px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding:22px 16px 18px;
  overflow:hidden;
}
.cover-spine-3d{
  position:absolute;top:0;left:0;width:22px;height:100%;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:2px 0 0 2px;
  transform-origin:left center;
  transform:rotateY(-90deg) translateX(-11px);
  display:flex;flex-direction:column;
  justify-content:space-between;align-items:center;
  padding:10px 0;
}
.spine-3d-title{
  writing-mode:vertical-rl;transform:rotate(180deg);
  font-size:9px;color:rgba(255,255,255,0.8);
  flex:1;text-align:center;overflow:hidden;max-height:100px;
  font-family:'monospace',sans-serif;
}
.spine-3d-author{
  font-size:7px;color:rgba(255,255,255,0.45);
  writing-mode:vertical-rl;transform:rotate(180deg);
  white-space:nowrap;font-family:'monospace',sans-serif;
}
.cover-top-3d{
  position:absolute;top:0;left:22px;right:0;height:10px;
  backface-visibility:hidden;
  transform-origin:top center;
  transform:rotateX(90deg) translateY(-5px);
  background:rgba(255,255,255,0.08);
}
.cover-bottom-3d{
  position:absolute;bottom:0;left:22px;right:0;height:10px;
  backface-visibility:hidden;
  transform-origin:bottom center;
  transform:rotateX(-90deg) translateY(5px);
  background:rgba(0,0,0,0.25);
}
.cover-deco{position:absolute;top:24px;left:50%;transform:translateX(-50%);width:70px;height:70px;opacity:0.15;}
.cover-book-title{
  font-size:14px;font-weight:normal;font-family:'monospace',sans-serif;
  color:rgba(255,255,255,0.95);text-align:center;line-height:1.4;
  position:relative;z-index:1;
}
.cover-book-author{
  font-size:10px;color:rgba(255,255,255,0.5);font-family:'monospace',sans-serif;
  text-align:center;margin-top:7px;position:relative;z-index:1;font-style:italic;
}

/* INFO PANEL */
#infoPanel{
  position:fixed;
  z-index:110;
  width:260px;
  opacity:0;
  transform:translateX(30px);
  transition:opacity 0.5s ease, transform 0.5s ease;
  pointer-events:none;
}
#infoPanel.visible{opacity:1;transform:translateX(0);pointer-events:all;}
.info-genre{
  font-size:9px;letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);margin-bottom:12px;font-family:'monospace',sans-serif;
}
.info-title{
  font-size:19px;font-family:'monospace',sans-serif;font-weight:normal;
  color:rgba(255,255,255,0.92);line-height:1.35;margin-bottom:6px;
}
.info-author{
  font-size:12px;color:rgba(255,255,255,0.4);font-family:'monospace',sans-serif;
  margin-bottom:18px;font-style:italic;
}
.info-desc{
  font-size:12.5px;color:rgba(255,255,255,0.62);font-family:'monospace',sans-serif;
  line-height:1.85;margin-bottom:24px;
}
.loan-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.7);font-family:'monospace',sans-serif;font-size:12px;
  padding:9px 20px;border-radius:2px;cursor:pointer;letter-spacing:0.08em;
  transition:background 0.2s,border-color 0.2s,color 0.2s;
}
.loan-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.9);}

/* CLOSE */
#closeBtn{
  position:fixed;top:24px;right:28px;z-index:120;
  font-size:20px;color:rgba(255,255,255,0.25);cursor:pointer;
  font-family:sans-sans-serif;font-weight:300;line-height:1;
  transition:color 0.2s;display:none;
}
#closeBtn:hover{color:rgba(255,255,255,0.6);}

/* LOAN MODAL */
#loanModal{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.88);
  align-items:center;justify-content:center;
}
#loanModal.active{display:flex;}
.loan-box{
  background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:4px;
  padding:32px 36px;width:320px;
}
.loan-box h3{font-size:14px;font-family:'monospace',sans-serif;font-weight:normal;color:rgba(255,255,255,0.85);margin-bottom:5px;}
.loan-box p{font-size:11px;color:rgba(255,255,255,0.35);font-family:'monospace',sans-serif;margin-bottom:18px;}
.loan-box input{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.82);font-family:'monospace',sans-serif;font-size:13px;
  padding:10px 14px;border-radius:2px;margin-bottom:8px;outline:none;
}
.loan-box input:focus{border-color:rgba(255,255,255,0.3);}
.loan-box input::placeholder{color:rgba(255,255,255,0.2);}
.loan-row-btns{display:flex;gap:8px;margin-top:10px;}
.loan-confirm{
  flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.8);font-family:'monospace',sans-serif;font-size:12px;
  padding:10px;border-radius:2px;cursor:pointer;transition:background 0.2s;
}
.loan-confirm:hover{background:rgba(255,255,255,0.15);}
.loan-cancel{
  background:transparent;border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.3);font-family:'monospace',sans-serif;font-size:12px;
  padding:10px 14px;border-radius:2px;cursor:pointer;
}
.loan-error{font-size:11px;color:#c07070;font-family:'monospace',sans-serif;margin-top:5px;min-height:16px;}
</style>
</head>
<body>

<h1>Josiah's Library</h1>

<div class="shelf-wrapper" id="shelfWrapper">
  <div class="shelf-fade-left"></div>
  <div class="shelf-fade-right"></div>
  <div class="shelf-track" id="shelfTrack">
    <div class="shelf-inner" id="shelfInner"></div>
  </div>
  <div class="shelf-plank" id="shelfPlank"></div>
</div>

<!-- overlay dim layer -->
<div id="overlay"></div>

<!-- close button -->
<div id="closeBtn" onclick="closeOverlay()">&#x2715;</div>

<!-- floating book -->
<div id="bookContainer">
  <div class="cover-scene">
    <div class="cover-book" id="coverBook">
      <div class="cover-face" id="coverFace">
        <div class="cover-deco">
          <svg viewBox="0 0 80 80" fill="white"><circle cx="40" cy="40" r="30"/><circle cx="40" cy="40" r="18" id="coverDecoBg"/></svg>
        </div>
        <div class="cover-book-title" id="coverTitle"></div>
        <div class="cover-book-author" id="coverAuthor"></div>
      </div>
      <div class="cover-spine-3d" id="coverSpine3d">
        <span class="spine-3d-title" id="spine3dTitle"></span>
        <span class="spine-3d-author" id="spine3dAuthor"></span>
      </div>
      <div class="cover-top-3d"></div>
      <div class="cover-bottom-3d"></div>
    </div>
  </div>
</div>

<!-- floating info panel -->
<div id="infoPanel">
  <div class="info-genre" id="infoGenre"></div>
  <div class="info-title" id="infoTitle"></div>
  <div class="info-author" id="infoAuthor"></div>
  <div class="info-desc" id="infoDesc"></div>
  <button class="loan-btn" id="loanBtn">Loan</button>
</div>

<!-- loan modal -->
<div id="loanModal">
  <div class="loan-box">
    <h3 id="loanModalTitle"></h3>
    <p>Enter your name and borrow code</p>
    <input type="text" id="nameInput" placeholder="ID"/>
    <input type="text" id="codeInput" placeholder="Code"/>
    <div class="loan-error" id="loanError"></div>
    <div class="loan-row-btns">
      <button class="loan-confirm" id="loanConfirm">Loan</button>
      <button class="loan-cancel" id="loanCancel">Cancel</button>
    </div>
  </div>
</div>

<script>
const VALID_CODES=["JOSLIB01","JOSLIB02","JOSLIB03","JOSLIB04","JOSLIB05"];
const WHATSAPP_NUMBER="60175558140";
const MAX_LOANS=2;
const loans={};

const BOOKS=[
  {id:1, title:"Thinking, Fast and Slow",                      author:"Daniel Kahneman",      genre:"Psychology",   color:"#1D6A96", borrowed:false, desc:"A landmark work exploring two systems that drive how we think — fast intuitive responses and slow deliberate reasoning, shaping every decision we make."},
  {id:2, title:"The Creative Act",                             author:"Rick Rubin",            genre:"Creativity",   color:"#3A3A8C", borrowed:false, desc:"Rick Rubin distills decades of creative work into a guide on living a creative life — from generating ideas to trusting the process of making art."},
  {id:3, title:"Sapiens",                                      author:"Yuval Noah Harari",     genre:"History",      color:"#2E7D52", borrowed:true,  desc:"A sweeping narrative of humankind's history, from the emergence of Homo sapiens in Africa to the revolutions of the modern age."},
  {id:4, title:"The Architecture of Happiness",                author:"Alain de Botton",       genre:"Architecture", color:"#7B3F8C", borrowed:false, desc:"A philosophical inquiry into the relationship between architecture and the human soul — how built environments shape our moods and identity."},
  {id:5, title:"Invisible Cities",                             author:"Italo Calvino",         genre:"Fiction",      color:"#B5451B", borrowed:false, desc:"Marco Polo describes 55 fantastical cities to Kublai Khan — each city a meditation on memory, desire, signs, and the limits of imagination."},
  {id:6, title:"A Pattern Language",                           author:"Christopher Alexander", genre:"Architecture", color:"#1A5C6B", borrowed:true,  desc:"A timeless catalog of 253 design patterns — from regions and towns down to rooms and windows — that make the built environment feel alive."},
  {id:7, title:"Atomic Habits",                                author:"James Clear",           genre:"Self-help",    color:"#6B4226", borrowed:false, desc:"A practical guide to building good habits and breaking bad ones, grounded in the idea that tiny improvements compound into remarkable change."},
  {id:8, title:"The Design of Everyday Things",                author:"Don Norman",            genre:"Design",       color:"#8C6B1A", borrowed:false, desc:"A classic introduction to human-centred design, explaining why some products delight while others frustrate — and what separates good design from bad."},
  {id:9, title:"Siddhartha",                                   author:"Hermann Hesse",         genre:"Fiction",      color:"#2D6B4F", borrowed:false, desc:"A timeless spiritual novel following a young man's quest for enlightenment in ancient India, touching rivers, teachers, and the depths of the self."},
  {id:10,title:"Ways of Seeing",                               author:"John Berger",           genre:"Art",          color:"#8C1A3A", borrowed:false, desc:"A radical reexamination of how we look at art and images — arguing that the way we see is shaped by assumptions we rarely question."},
  {id:11,title:"Meditations",                                  author:"Marcus Aurelius",       genre:"Philosophy",   color:"#4A6741", borrowed:false, desc:"The private journal of a Roman emperor — a stoic guide to living with clarity, humility, and quiet purpose."},
  {id:12,title:"Complexity and Contradiction in Architecture", author:"Robert Venturi",        genre:"Architecture", color:"#5C3A8C", borrowed:false, desc:"A manifesto against Modernist orthodoxy, celebrating the messy vitality of historical architecture and arguing for richness and ambiguity in design."},
  {id:13,title:"The Stranger",                                 author:"Albert Camus",          genre:"Fiction",      color:"#8C3A1A", borrowed:false, desc:"Camus's existentialist masterpiece about Meursault, a detached man who commits a senseless murder and faces the indifference of the universe."},
  {id:14,title:"Quiet",                                        author:"Susan Cain",            genre:"Psychology",   color:"#1A4A8C", borrowed:true,  desc:"A celebration of introverts and the power of quiet — arguing that introversion is a deeply undervalued trait that the world needs more of."},
  {id:15,title:"Finite and Infinite Games",                    author:"James Carse",           genre:"Philosophy",   color:"#6B1A5C", borrowed:false, desc:"A slim, profound book distinguishing two types of games — finite games played to win, and infinite games played to continue play itself."},
  {id:16,title:"The Elements of Style",                        author:"Strunk & White",        genre:"Writing",      color:"#7A5C2E", borrowed:false, desc:"The definitive guide to clear, concise English writing — a slim volume that has shaped the prose of generations of writers and editors."},
  {id:17,title:"Dune",                                         author:"Frank Herbert",         genre:"Fiction",      color:"#8C7A1A", borrowed:false, desc:"An epic science-fiction masterwork set on the desert planet Arrakis, exploring ecology, religion, politics, and the rise of a reluctant messiah."},
  {id:18,title:"The Power of Now",                             author:"Eckhart Tolle",         genre:"Philosophy",   color:"#2E5C4F", borrowed:false, desc:"A spiritual guide to living fully in the present moment — dissolving the endless mental noise that keeps us from peace, clarity, and awareness."},
  {id:19,title:"How Buildings Learn",                          author:"Stewart Brand",         genre:"Architecture", color:"#4A3A6B", borrowed:false, desc:"An exploration of how buildings adapt over time — how some structures gracefully absorb change while others resist it, and what that means for design."},
  {id:20,title:"The Name of the Rose",                         author:"Umberto Eco",           genre:"Fiction",      color:"#5C2E1A", borrowed:false, desc:"A medieval murder mystery set in an Italian abbey, weaving theology, semiotics, and labyrinthine intrigue into one of the great literary detective novels."},
  {id:21,title:"Man's Search for Meaning",                     author:"Viktor Frankl",         genre:"Psychology",   color:"#1A3A5C", borrowed:false, desc:"A psychiatrist's account of surviving Nazi concentration camps, and the discovery that meaning — not pleasure — is the deepest human motivation."},
  {id:22,title:"The Timeless Way of Building",                 author:"Christopher Alexander", genre:"Architecture", color:"#3A5C2E", borrowed:false, desc:"The philosophical companion to A Pattern Language — exploring the quality that makes certain places feel alive, whole, and deeply human."},
  {id:23,title:"Flowers for Algernon",                         author:"Daniel Keyes",          genre:"Fiction",      color:"#6B2E4A", borrowed:false, desc:"Told through journal entries, the story of Charlie Gordon — a man with an intellectual disability who undergoes an experiment that dramatically raises his IQ."},
  {id:24,title:"The Alchemist",                                author:"Paulo Coelho",          genre:"Fiction",      color:"#8C5C1A", borrowed:false, desc:"A young shepherd's journey from Spain to Egypt in search of treasure becomes a parable about following your dreams and listening to your heart."},
  {id:25,title:"Thinking in Systems",                          author:"Donella Meadows",       genre:"Design",       color:"#1A5C3A", borrowed:false, desc:"A primer on systems thinking — how to see the interconnections and feedback loops that shape the world, from ecosystems to economies to organisations."},
];

const BOOK_W=39;
const TARGET_SPEED=0.45;
const RESUME_DURATION=3000;
let offsetX=0, paused=false, overlayOpen=false;
let resuming=false, resumeStart=null, resumeTimer=null;
let currentBookId=null, selectedSpineEl=null;
let tiltActive=false, baseTilt={x:0,y:0}, currentTilt={x:0,y:0};
let bookRevealed=false;
let isClosing=false;

function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

function darken(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.max(0,((n>>16)&0xff)-amt);
  const g=Math.max(0,((n>>8)&0xff)-amt);
  const b=Math.max(0,(n&0xff)-amt);
  return `rgb(${r},${g},${b})`;
}

function applyOffset(){
  const inner=document.getElementById('shelfInner');
  if(!inner)return;
  const total=BOOK_W*BOOKS.length;
  while(offsetX>=total*2)offsetX-=total;
  while(offsetX<0)offsetX+=total;
  inner.style.transform=`translateX(${-offsetX}px)`;
}

function buildShelf(){
  const inner=document.getElementById('shelfInner');
  inner.innerHTML='';
  // triple the books for seamless loop
  [...BOOKS,...BOOKS,...BOOKS].forEach((book,idx)=>{
    const hashVal=book.title.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const h=150+(hashVal%55);
    const el=document.createElement('div');
    el.className='book-spine'+(book.borrowed?' borrowed':'');
    el.style.cssText=`background:${book.color};height:${h}px;`;
    el.dataset.id=book.id;
    el.dataset.borrowed=book.borrowed?'1':'0';
    el.dataset.idx=idx;
    el.innerHTML=`
      <span class="spine-title">${book.title}</span>
      <span class="spine-author">${book.author.split(' ').pop()}</span>
      ${book.borrowed?'<span class="borrowed-dot"></span>':''}
    `;
    inner.appendChild(el);
  });
}

function initOffset(){
  // start so books are off screen left, entering from left edge
  const trackW=window.innerWidth;
  const total=BOOK_W*BOOKS.length;
  // position so the visible window shows nothing yet (all books scrolled past)
  offsetX=total*2 - trackW;
  if(offsetX<0)offsetX=total;
  applyOffset();
}

function scheduleResume(delay){
  if(resumeTimer)clearTimeout(resumeTimer);
  resumeTimer=setTimeout(()=>{
    paused=false;resuming=true;resumeStart=null;
  },delay);
}

function tick(ts){
  if(!paused){
    let speed=TARGET_SPEED;
    if(resuming){
      if(!resumeStart)resumeStart=ts;
      const t=Math.min((ts-resumeStart)/RESUME_DURATION,1);
      speed=TARGET_SPEED*easeInOutCubic(t);
      if(t>=1)resuming=false;
    }
    offsetX+=speed;
    applyOffset();
  }

  // tilt lerp — only when fully revealed and not closing
  if(overlayOpen&&bookRevealed&&!isClosing){
    const tx=tiltActive?baseTilt.x:0;
    const ty=tiltActive?baseTilt.y:0;
    currentTilt.x+=(tx-currentTilt.x)*0.06;
    currentTilt.y+=(ty-currentTilt.y)*0.06;
    const cb=document.getElementById('coverBook');
    if(cb){
      cb.style.transition='none';
      cb.style.transform=`rotateY(${currentTilt.y}deg) rotateX(${currentTilt.x}deg)`;
    }
  }

  requestAnimationFrame(tick);
}

function showCover(id, spineEl){
  const book=BOOKS.find(b=>b.id===id);
  if(!book||overlayOpen||isClosing)return;

  currentBookId=id;
  selectedSpineEl=spineEl;

  // hide the spine on shelf
  spineEl.classList.add('selected');

  paused=true;resuming=false;overlayOpen=true;bookRevealed=false;isClosing=false;
  tiltActive=false;currentTilt={x:0,y:0};baseTilt={x:0,y:0};
  if(resumeTimer)clearTimeout(resumeTimer);

  // fill content
  document.getElementById('coverFace').style.background=book.color;
  document.getElementById('coverSpine3d').style.background=darken(book.color,40);
  document.getElementById('coverDecoBg').setAttribute('fill',book.color);
  document.getElementById('coverTitle').textContent=book.title;
  document.getElementById('coverAuthor').textContent=book.author;
  document.getElementById('spine3dTitle').textContent=book.title;
  document.getElementById('spine3dAuthor').textContent=book.author.split(' ').pop();
  document.getElementById('infoGenre').textContent=book.genre;
  document.getElementById('infoTitle').textContent=book.title;
  document.getElementById('infoAuthor').textContent=book.author;
  document.getElementById('infoDesc').textContent=book.desc;
  document.getElementById('loanModalTitle').textContent=book.title;

  // get spine position FRESH right now (scroll may have moved since mousedown)
  const sr=spineEl.getBoundingClientRect();
  const spineLeft=sr.left;
  const spineTop=sr.top;
  const spineH=sr.height;
  const spineW=sr.width;

  // final resting position: book left of center, info to the right
  const bookW=200, bookH=300;
  const vpW=window.innerWidth, vpH=window.innerHeight;
  const finalLeft=vpW/2-bookW/2-140;
  const finalTop=vpH/2-bookH/2;

  const bc=document.getElementById('bookContainer');
  const cb=document.getElementById('coverBook');
  const info=document.getElementById('infoPanel');

  info.classList.remove('visible');
  info.style.left=(finalLeft+bookW+48)+'px';
  info.style.top=finalTop+'px';

  // show and reset bookContainer
  bc.style.display='block';
  bc.classList.remove('interactive');

  // start: at spine position, squished to spine shape
  const scaleX=spineW/bookW;
  const scaleY=spineH/bookH;
  bc.style.transition='none';
  bc.style.left=spineLeft+'px';
  bc.style.top=spineTop+'px';
  cb.style.transition='none';
  cb.style.transform=`scaleX(${scaleX}) scaleY(${scaleY}) rotateY(75deg)`;

  // show overlay
  const ov=document.getElementById('overlay');
  ov.classList.add('active');
  document.getElementById('closeBtn').style.display='block';

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    ov.classList.add('dimmed');

    // animate to center
    bc.style.transition='left 0.75s cubic-bezier(0.4,0,0.2,1), top 0.75s cubic-bezier(0.4,0,0.2,1)';
    bc.style.left=finalLeft+'px';
    bc.style.top=finalTop+'px';

    // rotate open
    cb.style.transition='transform 0.75s cubic-bezier(0.4,0,0.2,1)';
    cb.style.transform='scaleX(1) scaleY(1) rotateY(0deg)';

    bc.classList.add('interactive');

    setTimeout(()=>{
      if(!overlayOpen)return; // guard: user closed before animation finished
      bookRevealed=true;
      setTimeout(()=>{
        if(!overlayOpen)return;
        info.classList.add('visible');
      },200);
    },800);
  }));
}

function closeOverlay(){
  if(!overlayOpen||isClosing)return;
  isClosing=true;
  bookRevealed=false;tiltActive=false;baseTilt={x:0,y:0};currentTilt={x:0,y:0};

  const info=document.getElementById('infoPanel');
  info.classList.remove('visible');

  const cb=document.getElementById('coverBook');
  const bc=document.getElementById('bookContainer');

  // stop tilt loop interfering
  bc.classList.remove('interactive');

  // snap transform back to spine shape then move container to spine
  cb.style.transition='transform 0.4s cubic-bezier(0.4,0,0.2,1)';
  cb.style.transform='scaleX(0.18) scaleY(0.8) rotateY(75deg)';

  const ov=document.getElementById('overlay');
  ov.classList.remove('dimmed');

  if(selectedSpineEl){
    const sr=selectedSpineEl.getBoundingClientRect();
    bc.style.transition='left 0.4s cubic-bezier(0.4,0,0.2,1), top 0.4s cubic-bezier(0.4,0,0.2,1)';
    bc.style.left=sr.left+'px';
    bc.style.top=sr.top+'px';
  }

  setTimeout(()=>{
    // fully hide everything
    ov.classList.remove('active');
    document.getElementById('closeBtn').style.display='none';
    bc.style.display='none';
    bc.style.transition='none';
    // reset transform so next open starts clean
    cb.style.transition='none';
    cb.style.transform='scaleX(1) scaleY(1) rotateY(0deg)';

    overlayOpen=false;
    isClosing=false;

    if(selectedSpineEl){
      selectedSpineEl.classList.remove('selected');
      selectedSpineEl=null;
    }
    scheduleResume(4000);
  },420);
}

document.getElementById('overlay').addEventListener('click',e=>{
  if(overlayOpen)closeOverlay();
});

// tilt on cover scene
const coverScene=document.querySelector('.cover-scene');
coverScene.addEventListener('mousemove',e=>{
  if(!overlayOpen||!bookRevealed)return;
  tiltActive=true;
  const r=coverScene.getBoundingClientRect();
  const dx=(e.clientX-(r.left+r.width/2))/(r.width/2);
  const dy=(e.clientY-(r.top+r.height/2))/(r.height/2);
  baseTilt.y=dx*15;
  baseTilt.x=-dy*10;
});
coverScene.addEventListener('mouseleave',()=>{
  tiltActive=false;
  baseTilt={x:0,y:0};
});
coverScene.addEventListener('click',e=>e.stopPropagation());
document.getElementById('infoPanel').addEventListener('click',e=>e.stopPropagation());

// loan
document.getElementById('loanBtn').addEventListener('click',()=>{
  document.getElementById('loanError').textContent='';
  document.getElementById('nameInput').value='';
  document.getElementById('codeInput').value='';
  document.getElementById('loanModal').classList.add('active');
});
document.getElementById('loanCancel').addEventListener('click',()=>{
  document.getElementById('loanModal').classList.remove('active');
});
document.getElementById('loanConfirm').addEventListener('click',()=>{
  const book=BOOKS.find(b=>b.id===currentBookId);
  if(!book)return;
  const name=document.getElementById('nameInput').value.trim();
  const code=document.getElementById('codeInput').value.trim().toUpperCase();
  const err=document.getElementById('loanError');
  if(!name){err.textContent='Please enter your name.';return;}
  if(!VALID_CODES.includes(code)){err.textContent='Invalid borrow code. Ask Josiah for one!';return;}
  const ex=loans[code]||[];
  if(ex.length>=MAX_LOANS){err.textContent=`This code has reached the ${MAX_LOANS}-book limit.`;return;}
  loans[code]=[...ex,currentBookId];
  const msg=encodeURIComponent(`Hi Josiah! I'd like to borrow "${book.title}" by ${book.author}.\n\nName: ${name}\nCode: ${code}`);
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`,'_blank');
  document.getElementById('loanModal').classList.remove('active');
});

// drag
const track=document.getElementById('shelfTrack');
let dragStartX=0,offsetAtDragStart=0,isDragging=false;
let didMove=false,lastX=0,vel=0,pendingId=null,pendingEl=null;

track.addEventListener('mousedown',e=>{
  if(overlayOpen)return;
  isDragging=true;didMove=false;
  dragStartX=e.clientX;offsetAtDragStart=offsetX;
  lastX=e.clientX;vel=0;pendingId=null;pendingEl=null;
  const sp=e.target.closest('.book-spine');
  if(sp&&sp.dataset.borrowed==='0'){
    pendingId=parseInt(sp.dataset.id);
    pendingEl=sp; // store element ref, NOT the rect
  }
  track.classList.add('dragging');
  e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const dx=e.clientX-dragStartX;
  if(Math.abs(dx)>5){didMove=true;pendingId=null;}
  if(didMove){
    offsetX=offsetAtDragStart-dx;applyOffset();
    vel=(lastX-e.clientX)*0.6;lastX=e.clientX;
    paused=true;resuming=false;
    if(!overlayOpen)scheduleResume(8000);
  }
});
window.addEventListener('mouseup',()=>{
  if(!isDragging)return;
  isDragging=false;track.classList.remove('dragging');
  if(!didMove&&pendingId!==null&&pendingEl){
    // get rect NOW at mouseup — shelf has stopped, position is accurate
    showCover(pendingId,pendingEl);
  }else if(didMove){
    let v=vel;
    (function gl(){if(Math.abs(v)<0.15)return;offsetX+=v;applyOffset();v*=0.93;requestAnimationFrame(gl);})();
  }
  pendingId=null;pendingEl=null;
});

let tSX=0,tOS=0,tDM=false,tLX=0,tV=0,tPI=null,tPE=null;
track.addEventListener('touchstart',e=>{
  if(overlayOpen)return;
  tSX=e.touches[0].clientX;tOS=offsetX;tDM=false;
  tLX=e.touches[0].clientX;tV=0;tPI=null;tPE=null;
  const sp=e.target.closest('.book-spine');
  if(sp&&sp.dataset.borrowed==='0'){tPI=parseInt(sp.dataset.id);tPE=sp;}
},{passive:true});
track.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-tSX;
  if(Math.abs(dx)>5){tDM=true;tPI=null;}
  if(tDM){offsetX=tOS-dx;applyOffset();tV=(tLX-e.touches[0].clientX)*0.6;tLX=e.touches[0].clientX;
    paused=true;resuming=false;if(!overlayOpen)scheduleResume(8000);}
},{passive:true});
track.addEventListener('touchend',()=>{
  if(!tDM&&tPI!==null&&tPE)showCover(tPI,tPE);
  else if(tDM){let v=tV;(function gl(){if(Math.abs(v)<0.15)return;offsetX+=v;applyOffset();v*=0.93;requestAnimationFrame(gl);})();}
  tPI=null;tPE=null;
});

// init
window.addEventListener('load',()=>{
  buildShelf();
  initOffset();
  const inner=document.getElementById('shelfInner');
  inner.style.opacity='0';
  setTimeout(()=>{
    inner.style.transition='opacity 1s ease';
    inner.style.opacity='1';
  },200);
  requestAnimationFrame(tick);
});
</script>
